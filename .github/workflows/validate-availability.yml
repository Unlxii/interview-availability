name: Validate availability.json

# Quality gate: broken JSON would silently fall back to defaults on the live
# page. Fail fast at push time instead of discovering it in production.

on:
  push:
    paths:
      - availability.json
  pull_request:
    paths:
      - availability.json

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Schema check
        run: |
          node -e '
          const fs = require("fs");
          const d = JSON.parse(fs.readFileSync("availability.json", "utf8"));
          const DATE = /^\d{4}-\d{2}-\d{2}$/;
          const TIME = /^([01]\d|2[0-3]):[0-5]\d-([01]\d|2[0-3]):[0-5]\d$/;
          const fail = (m) => { console.error("INVALID:", m); process.exit(1); };
          if (!["open", "limited", "busy"].includes(d.status)) fail("status must be open|limited|busy");
          if (!DATE.test(String(d.updated))) fail("updated must be YYYY-MM-DD");
          if (!Array.isArray(d.busy)) fail("busy must be an array");
          if (d.focus !== undefined) {
            if (!Array.isArray(d.focus)) fail("focus must be an array of strings");
            for (const [i, f] of d.focus.entries())
              if (typeof f !== "string" || f.length > 60) fail(`focus[${i}]: must be a string <= 60 chars`);
          }
          if (d.gaming !== undefined) {
            if (!Array.isArray(d.gaming)) fail("gaming must be an array");
            if (d.gaming.length > 8) fail("gaming: max 8 tags");
            const URLRE = /^https?:\/\//i;
            for (const [i, g] of d.gaming.entries()) {
              if (typeof g.label !== "string" || !g.label.trim() || g.label.length > 40) fail(`gaming[${i}]: label must be a non-empty string <= 40 chars`);
              if (g.url !== undefined && (typeof g.url !== "string" || !URLRE.test(g.url) || g.url.length > 300)) fail(`gaming[${i}]: url must be http(s) and <= 300 chars`);
            }
          }
          const TAG_COLORS = ["teal", "fuchsia", "blue", "amber", "lime", "rose", "violet", "cyan"];
          for (const [i, b] of d.busy.entries()) {
            if (!DATE.test(String(b.from)) || !DATE.test(String(b.to))) fail(`busy[${i}]: from/to must be YYYY-MM-DD`);
            if (b.to < b.from) fail(`busy[${i}]: reversed range (${b.from} > ${b.to})`);
            if (b.time && !TIME.test(b.time)) fail(`busy[${i}]: time must be HH:MM-HH:MM`);
            // "feedback" publishes as an anonymous colored dot only — admin.html strips its label
            // before export, so if this entry has a real label here, something leaked it.
            if (b.kind !== undefined && !["flex", "exam", "interview", "exercise", "activity", "feedback"].includes(b.kind))
              fail(`busy[${i}]: kind must be "flex", "exam", "interview", "exercise", "activity", "feedback", or omitted`);
            if (typeof (b.label ?? "") !== "string" || String(b.label || "").length > 120) fail(`busy[${i}]: label must be a string <= 120 chars`);
            if (b.color !== undefined && !TAG_COLORS.includes(b.color)) fail(`busy[${i}]: color must be one of ${TAG_COLORS.join(", ")}`);
            if (b.free !== undefined && typeof b.free !== "boolean") fail(`busy[${i}]: free must be a boolean`);
          }
          console.log(`availability.json valid — ${d.busy.length} busy period(s)`);'
